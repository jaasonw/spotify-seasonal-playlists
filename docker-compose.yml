services:
  spotify-seasonal-backend:
    build: .
    container_name: spotify-seasonal-backend
    expose: 
      - 8080
    ports:
      - "8090:8080"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - pocketbase_url=http://spotify-seasonal-database:8090
  spotify-seasonal-database:
    image: ghcr.io/muchobien/pocketbase:0.22.32
    container_name: spotify-seasonal-database
    restart: unless-stopped
    expose:
      - 8090
    ports:
      - "127.0.0.1:8091:8090"
    volumes:
      - ./pb/pb_data:/pb_data
      - ./pb/pb_public:/pb_public
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
